apiVersion: v1
kind: Service
metadata:
  name: transaction-api-service
  namespace: {{ .Values.namespace }}
  labels:
    app: transaction-api
spec:
  selector:
    app: transaction-api
  ports:
    - name: http
      protocol: TCP
      port: {{ .Values.service.port }}
      targetPort: http
  type: {{ .Values.service.type }}
