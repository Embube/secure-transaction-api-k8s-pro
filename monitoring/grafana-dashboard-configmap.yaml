apiVersion: v1
kind: ConfigMap
metadata:
  name: secure-transaction-api-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  secure-transaction-api.json: |
    {
      "annotations": {"list": []},
      "editable": true,
      "graphTooltip": 0,
      "panels": [
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {}, "overrides": []},
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 0},
          "id": 1,
          "targets": [{"expr": "sum(rate(http_requests_total[5m]))", "refId": "A"}],
          "title": "Request Rate",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {}, "overrides": []},
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 0},
          "id": 2,
          "targets": [{"expr": "histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket[5m])) by (le))", "refId": "A"}],
          "title": "P95 Latency",
          "type": "timeseries"
        }
      ],
      "schemaVersion": 39,
      "style": "dark",
      "tags": ["kubernetes", "flask", "prometheus"],
      "templating": {"list": []},
      "time": {"from": "now-6h", "to": "now"},
      "timezone": "",
      "title": "Secure Transaction API",
      "version": 1
    }
