apiVersion: v1
kind: Pod
metadata:
  name: "transaction-api-test"
  namespace: {{ .Values.namespace }}
  annotations:
    "helm.sh/hook": test
spec:
  restartPolicy: Never
  containers:
    - name: wget
      image: busybox:1.36
      command: ['sh', '-c', 'wget -qO- http://transaction-api-service/health | grep healthy']
